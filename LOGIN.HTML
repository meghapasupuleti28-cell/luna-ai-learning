<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luna | Login</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

.login-container{
height:80vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.login-box button{
width:100%;
margin-top:10px;
}

.signup{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">🌙 Luna</div>

<nav>
<a href="index.html">Home</a>
<a href="courses.html">Courses</a>
</nav>

</header>


<div class="login-container">

<div class="login-box">

<h2>Luna Login</h2>

<form>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button class="primary">Login</button>

</form>

<div class="signup">
<p>New to Luna? <a href="#">Create Account</a></p>
</div>

</div>

</div>


<footer>

<p>© 2026 Luna Learning Platform</p>

</footer>

</body>

</html>
